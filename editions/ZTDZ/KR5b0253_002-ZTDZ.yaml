front:
  text: 上清天樞院回車畢道正法卷中此五
  hash: sha256:136a7eeec67e0bd2ee4e8d82ebda75571905d9b638cab4d2a9aeb6762ca7a7bf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0253_SJB_002-100480b, image: sjb/10/100480b.png}
body:
  text: 布氣法至誠到處向日焚香仰祝曰具職位某仰告太陽帝君臣某行天樞院天心正法救治萬民疾苦布氣安神今乞特賜慈悲願降眞氣入臣身中泥丸百節五臟六腑浩然充滿凡治生靈願無不効畢志心唯一鳴天鼓七下開目向日兩手各搯中指第三節便向日取氣一口吞之念呪七遍然後吞此第二口也再搯右手念呪七遍又取一口氣吞之便將兩手交對口上呪七遍又取眞氣一口吹兩訣上周而復始如此爲之者三呪曰風疼風裏去氣痛隨氣滅凡有患人令在東南方西北向師在西北東南向對面坐令患人按定痛處不得放先嗽一聲便取氣一口未得吞下便安兩手如前訣呪七遍令再嗽聲取氣吞下再呪如前輕者三五次重五七次必効呪水法淨心淨意兩手中指按掌心文請五方二十八宿謹請東方角亢之星精眞形仗劔持符護吾身形謹請南方井鬼之星精眞形仗劔持符護吾身形謹請西方奎婁之星精眞形仗劔持符護吾身形謹請北方斗牛之星精眞形仗劔持符護吾身形謹請中央七星之精黄之眞形仗劔持符護吾身形五方眞氣入吾此水此水非常之水上清無極大道自然之水能除疾病能救苦厄吾此水一點落處皆成清浄若是正神著此水者廣大神通若是祅怪著此水者身如大火所燒此水皆是上天眞人降眞氣所成何邪不伏何鬼敢形當吾者死背吾者亡神水到處萬鬼伏藏呪曰魁元乾元利貞璇貞太虛請勑崐崘天户急急如上清律令三七遍右用灑淨則蕩諸邪穢吞符則莫不立應時行瘟疫可灑宅舍内外及有病煎煑湯散其効乃信無所不用也取勞蟲法凡人患傳屍疾未及一百二十日者則先虔請正一道士作醮三日書符三道依後法與患人服之至第四日預備鐺一隻煎油五斤以上用白絹一疋縛患人於柱上用生絲左線三條各長四尺四寸毎條桃木上縛符一道令患人以人參湯吞下一道令人把定候符収線入腹中繋用尺斡開口急拔出符蟲在上如此三度取蟲三條皆作聲入油煎了乃安一條兩條斷必死第一符用絹半寸方以朱書左手午上爲訣念呪書以蠟丸之於第一日丑時服之乳香湯下念呪三遍書成呪曰天靈三光神令我受賜命令受勑斬汝勑至法奉行第二符用絹半寸方以朱書左手申上爲訣念呪書之以蠟爲丸於第二日午時服之乳香湯下念呪三遍乃書成呪曰本爲汝我損我今辟合汝如是諸飛天流浪飲屍鬼第三符用絹半寸方以朱書左手亥上爲訣念呪書以蠟爲丸至第三日亥時服乳香湯下念呪三遍書成呪曰太上大道君受我保身形吉慶降天符太一合元眞治痁法發至七日了可治發時兩手中指搯掌中心看患人持呪七遍令嗽一聲取氣一口在壁三度呪之令患人忌五辛毒物各七日呪曰殺殺縛勑斬滅安蠶神符貼蠶室内鎮宅神符移腫毒腫毒雖七八分者亦可治訣在左手午上按定痛處呪曰汝是毒何損人肉吾今送汝上刀岡急急如律令勑呪七遍移訣令嗽一聲取氣一口吹在地上乃以脚滅之治瘟說治瘟自有法中常儀初入門仍先用兩手中指搯掌心呪曰閉天目一切鬼神不見此是爲患人布氣之法到患人牀前曰行疫年王行病使者此子行不善道天令汝等巡歴此子今改過歸奉大道吾已奏聞上帝牒城隍訖如不係天符勾取可急収藥毒氣毒前去不得少停恐天赦將至如違的不容情急急奉行治鬼邪法患人身須得實年月日時右手仗劎先搯訣搯年上呪四十九遍噀水一口於患人身上若輕便住如未住則搯生月上呪四十九遍噀水一口於患人身或尚未全退則生日生時並同前法爲之周而復始待報應乃巳呪曰天勑上赦急令絶惡急煞急縛右恐不得月日時只如子生便用子上此乃天中四剌縛邪法也更以乳香湯下北斗七元符三台符也治心邪血邪草靈丹方神桃七箇乳香半兩辰砂半兩酸棗仁半兩當歸半兩地黄半兩雄黃半兩右七味爲末以蠟爲丸如梧桐子大毎服二十一丸并符七道臨時看甚符亦作丸子丈夫燈心湯下婦人紅花湯下治顚邪行持及斷鬼神祕法下元生人行諸不善發驕慢心恣縱婬殺常生輕謗行不孝道慳貪不足而生妄心既有妄心即驚其神煩惱妄想憂苦身心是以邪魅乘虚而來以投其隙精邪下鬼百怪千妖侵剋形魂叫笑不常喜怒不定精神恍惚或歌或舞或悲或啼飲食太過不識尊卑千條萬紀或因塜墓不安祭祀不謹居處凶地伐樹成災不可不知也試論其狀即辯其源矣心病屬火乃面赤叫笑聲髙多嗔少喜肝病屬木乃面青飲酒太過悲憂不止肺病屬金乃面白持刄行兇常言闘殺脾病屬土色黃飲食太過而常稱不絶腎病屬水憂悲不常多拆衣服低頭咬齒狀若怕羞是也此乃五臟受邪之證先須行持以符服之然後隨其本臟用藥攻之無不効矣識鬼邪睜目咬牙凶橫自刑之鬼也歌舞呌笑山魈之鬼也呼神喚鬼咬器物者客亡之鬼也或嗔或喜社廟之鬼也咬牙叫喚聲如忍痛落水之鬼也恐懼生人精物之鬼也怕日羞明血死産難之鬼也多好遊走樹木之鬼也自刑覓死𡨚債之鬼也多好眠睡獄死之鬼也至於持誦看經而輕慢經典嘆氣呻吟心氣有憂多言虛詐失志歌舞嗔喜不定亦邪鬼之候矣凡驗鬼祟即依此式無有不實若欲知其有病無病即驗其眼目上視或青或白鮮淨者無患如常者並虚詐也凡欲治顚邪即先令投狀次間住處靈祗牒本屬城隍差借吏兵去防護然後入斗存身行持具威儀前去看驗依科行法不得任性見患人須和柔訓化勿傷神氣乃使不生狂惡故全其理也入斗存身行持祕法凡治顚邪凶惡之鬼切須齋心沐浴先行持而徃至彼亦不可散心恐頑愚下鬼無所知識敢有不從致失威儀黷上帝之命雖乆而終就擒捉亦忤行持若是毎行持面東焚香正身端立用兩手大指各搯上清訣從腦後轉至眉心分直從𦙄前下叉腰黙呪曰吾身中功曹使者當召岀吾身中十二時辰陽平二十四氣七十二候左三魂右七魄一萬二千精光神二萬二千形影神三萬三千毛竅神心神脾神肺神肝神腎神各具威儀與吾吉慶賜吾大道令吾身形化爲上清玄都三十六洞大伏魔法師頂逺遊冠身披絳綃服執圭朱履身坐玉局汝等靈神衞吾左右上使紅光蓋吾下使祥雲園遶前至某處某人家考察邪鬼治病除祅使令邪魔萬鬼自誅凶惡不見疾病削除南靈覆護變形玉虚急急如上清律令勑呪畢面東噀水一口乘於身上次再焚香面南叩齒具位姓名稽首南極天府星君南極天相星君南極天梁星君南極天同星君南極天樞星君南極天機星君南極萬夀星君南極三明夫人南極火鈴将軍臣某今日吉慶長齋修行無量度人濟世除祅破邪立正伏望南府星君特賜神光衛護身形使者三千人火鈴将軍下護臣身令得長生急急如上清律令呪畢叩齒依儀式歩罡一歩念一星君丁罡天府星君天相星君天機星君天同星君天樞星君天梁星君歩畢執劒呪曰某日功曹使者吾遣汝上天速至天門遣汝入地速至地户遣汝入水速至水府吾今不遣汝上天不遣汝入地不遣汝入水遣汝速至某處某家告示某人住處司命土地干係等神秖并本屬城隍差來兵將仰防禦本所前來看驗某人疾患須管精嚴無令穢觸有失威儀次念天靈地靈天地交并功曹神將不得留停速去速來吾在壇前卓劒相待急急如上清律令呪畢便将劒卓在地二手十指相叉喝一聲去凡入患人家纔入門見人便収却頭巾直上廳上正坐纔坐時便用二手中指搯掌心爲訣布氣一口於四方便呪曰吾是元皇之孫太上之子北斗與我爲所使周行禹歩天吏所使左侍青龍右侍白虎三清上帝宻布眞炁敢有祅氣惡逆之鬼當不伏者金羅鐵網酆都處死急急如律令勑呪七遍了便於周回収氣一口吹在二手内便重搯訣令痛呪曰天爲我父地爲我母日月爲我兄弟七星爲我朋友六甲將軍手執鉞斧地甲將軍嚴持鍾鼓三台前行禽宿後使吾與天爲臣受天所使斬邪吞魔縛祅攝鬼指呼爲命調理剛氣上天符命土地皆至急急奉行東方東方青帝青童君執鍾擊鼓速縛興祅之鬼入金羅之獄重罪無情急成公案併令如前受天符命目視東方喝云去南方南方赤帝赤童君手執雷電速縛興祅之鬼入無了之獄重罪無情急成公案併令如前受天符命目視南方喝云去西方西方白帝白童君手執鉞斧速縛興祅之鬼入䧟海之獄受罪無情急成公案併令如前受天符命目視西方喝云去北方北方黑帝黑童君手執帝鐘速縛興祅之鬼入無牽之獄受罪無情急成公案併令如前受天符命目視北方喝云去中央中央黄帝黃童君手執金槌速縛興祅之鬼入長停之獄受罪無情急成公案併令如前受天符命目視天喝云去其顚邪人必自呌喚便云左右統兵助法神將爲吾擒出便令其家人引患人至廳下其患人即㐲便呪曰患人纔出用王清訣天靈地靈天地交幷受差將吏無輒容情擒捉鬼賊速至堦前急急如律令呪七遍患人至堦下便云直日獄卒爲吾擒捉鬼賊便呪曰上天勑令速縛魔精隨行獄卒無輒容情急依天命勘㐲招情當吾歩下元亨利貞急急如律令呪三遍患人自坐纔坐便問令說因依如不伏便喝云爲枷却便呪七遍上清訣呪曰上天奉命玉帝魁榮枷下邪鬼有逆上清九天玄籍無輒容情急急如律令患人自如檐枷矣再問不伏兩手並作玉皇訣喝云爲吾綳却用紫微印呪七遍呪曰天靈天榮吾奉上清勑綳却鬼賊扺拒有刑魁罡㔶斗無輒容情急急如律令患人只自立如綳再問令說不伏便云爲吾打脚兩脚一同便呪曰勘鬼訣上天勑命枷禁邪精行刑獄卒不得容情併天符命依勑奉行急急如律令患人只自呌問因依不伏便使黄蜂之呪三遍勘鬼訣太魔太靈魁光七星九氣眞元永了上嚀奉命如命火急奉行急急如律令患人如又不伏便云爲吾縛上銅柱銅汁鐵丸灌之呪七遍勘鬼訣太微太微卜赤鍊銅汁九天永辜受罪無劫再生再死上帝勑攝併令獄卒食鬼飲血急急如律令患人呌苦便問因依斬鬼法用滅妖鬼訣兩手並作如斬鬼便将律驗法云汝今得此罪罪當斬便云當院劊子爲吾斬鬼呪曰天帝嚴勑受命創官領天符命無輒容情神鋒兩刃馘惡去除領赴壇下一劒去誅急急如律令呪七遍了便云推出凌遲鬼呪曰七遍天帝勑行天甲天丁鬼犯重罪粉骨碎形奉天勑命法到奉行急急如律令斷鬼呪用勘鬼訣天帝勑行立法無情三天符下受罪當刑奉天勑命法到奉行急急如律令配鬼呪用配鬼訣鬼犯惡罪心受無情當行律令配赴海營上天勑命依法奉行輒有不伏粉骨碎形急急如律令七遍自擒坐鬼賊呪至此呪每念了即噀水一口云滅也遙治顚邪心法凡是室女婦人不欲見者呪水了令取一盞洗手面了與患人洗乎面自洗手時用兩手搯玉皇訣呪七遍七吹入水内也呪曰神天龍手千魔自去設位大羅嘯詠洞歌急急如上清律令呪畢剔訣於水中訣目太清訣二指上勘鬼訣二指中玉清訣中指上玉皇訣中指中卓劎訣中指下上清訣四指中紫微訣四指中配鬼訣小指中滅鬼訣小指下欲徃治邪先燒關引及帖牓與本家土地司命門前五道干係等神祇候仍牒城隍借兵収擒看守用了即再用牒交還収管訖通明報應布氣呪乾元天靈甲乙丙丁戊巳太一壬癸守形朱雀覆護夀命長生身中功曹三五將軍左右神人今日吉慶得道至妙使我通靈蕩除穢氣凶惡不寧神清氣爽得道修貞急急如上清律令上清天樞院回車畢道正法卷中
