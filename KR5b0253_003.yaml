front:
  text: 上清天樞院回車畢道正法卷下此六
  hash: sha256:646b22b54dfd8f4b1b4a46b4b77b30da2761683f405e38e8547ee57f5709deb4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0253_HFL_003-001a, image: hfl/0313/0313-080.png}
body:
  text: 勘竃經驗狀式若有人投狀先焚香用二手指各搯亥上為訣叉定二腰叩齒三通望地吹氣一口再叩齒三通望中取氣一口吞之便呪曰天靈地靈天地差兵吾奉玉皇糾察邪精王民投狀事有懇情當院功曹輒敢久停速追司命勾禍鬼名速去速來吾在壇前卓劔相待急急如律令喝一聲去呪了便將投狀看於甚字上便認有無鬼祟為禍度事理依天律勑條施行如些小事只送所屬或付本家承事之神凡若應差鬼神兵將即寫某廟差來兵將於後押字上使都天法主印印之令用香酒茶果供養候病安用香紙送於本廟燒化投狀用金錢六貼馬十二匹香燭等本院神將如見凶者切莫與給雖安樂夀不永也切須子細愼勿容易損人功行此乃龍漢元年上清真境太上道君召天宫追攝人間竈君司命勘鞫令通説災禍邪鬼之由判屬天樞院救治施行也投狀式具州縣鄉里保社坊巷居住弟子姓某右某伏為某人見年若千歲月日時生自從某年月已來某疾不安纍經醫治並未痊安切慮有禍祟事入于此多被阻隔致令藥餌無靈今則無可投告謹具狀申上清天樞院伏乞指揮依法救治施行謹狀年月日同前姓某狀驗狀法州字與軍字同如無州字則天樞院二字同用點汙是三代家先有願門前五道不安東南方古墓神家收圓明之物及三七日內曾將血物歸倡鬼為災犯重是中房內户下有女伏尸骨深七尺及七年內至親血死傷亡宅土不安及此房飛尸女殃鬼挑起南方樹木五通之鬼因陪於食物而來兼西方飛土神注失五通香火山魈三代家先客亡自刑女鬼河道殁亡城隍社伯之神縣字點汙是宅神不安城隍有願星辰臨命此方山神隂土不安外人驚動之也犯重是南方遊土十年內作犯太歲家先有願及緋紫之神為禍因在外飲食而病挑起門前客死男傷亡及隂陽搆不明竃君不安觀寺淨願動及客中落胎鬼注失緋紫之神傳尸勞鬼父母呪咀北方親友之鬼門神宅土不安竈神有願鄉字點汙五廟有願東北方親知藥毒之鬼血蠱血尸飛勞之鬼犯重門下東方十步伏尸石精及家神有宗祖傳病之鬼挑起至親人呪咀於南方廟堂命犯星殺作犯宅土注失伏死古冢之鬼古畫功德異物為精家收勞死疰瘵之鬼衣物等保字點汙舊廟之神功德願動及血尸女鬼二七日東方食物承鬼傷入宅犯重竃第三口下有男枯骨及自刑女鬼北方河道傷亡古墓之神注失西方舊廟神作犯宅土井竃驚動門前自刑鬼女傷亡里字點汙河道男傷亡之鬼北方樹木五通之神北方銅象之精竃神有願犯重遊神五通西方浮土喪車之神鬼家物銅鐵之物命犯必死不在治挑起是山魈木客之鬼宅有願土府不安客死女傷亡之鬼注失南方療疰疾之鬼外入僧寺呪咀星辰臨命五道不安父母之鬼投狀如姓與名忘記不書者西方古暮五通客亡鬼并犯土藥毒鬼點汙父母之鬼家行暗昧不存父母上天所賜之禍犯重宗祖有願星殺為災叔伯父祖之鬼堂下伏尸古物石精挑起宗祖呪咀廟神口有諛謾謗易之過主必死不治注失土黃土箭土瘟山魈社伯河道女亡東北方蠱氣之鬼名婦人氏弟同點汙父母兄弟傳尸之鬼山魈為禍客堂伏尸家不積善有過父母至親呪咀北方樹木神古銅鐵之精必死不治犯重外祖之鬼觀寺親友呪咀死氣入宅北方債主之鬼客亡家收兵器山魈瓷瓦之祟鼓響之聲魚鱉之精南方自傷之鬼井泉女鬼患人名字婦女氏弟同點汙南方飲食受患西北方舊廟神堂後西方伏尸女𦍙之鬼犯重先祖有願朋友鬼客死傷亡星辰正照宿世𡨚家債主取命死不在治必死三人注失星辰有臨有願命犯短命北方喪車鬼五道勾起西南蠱鬼死不治也患年月日時默汙星宿照命宅有伏尸山精古怪丘陵古墓井泉之鬼犯重山神為崇坈穢之神廚下𡨚死鬼藥毒傷亡竃土不安挑起五通伏尸鬼西南方傳尸親友僧尼呪詛家收銅鐵之物成精注失東一房下有古兵器水精之怪竹木青黃之兆為笑及自刑鬼女人神字神字在上者一行中在上第一字是客亡女𦍙鬼自傷山魈古廟神五道有願土府不安在下一行中在下第一字是暗死女鬼神寺呪咀之鬼西方祖墓神二年內打煞物命點汙五通宗祖承事之鬼他人祖父母之鬼在宅執占地業為炎犯重夜魘之鬼東方飲食受患家收古器之物為妖産死之鬼挑起傳尸之鬼衣物飛蟲入宅南方花果之神死不在治注失水陸神願動父母呪咀山精青黃之精也丘陵古墓墳之神鬼字在上東南廟神正廳中下有男伏尸三七日內主見怪物為災在下百里廟神呪咀有願西北方河道傷亡宗祖之鬼點汙星辰有願兄弟之鬼南方尸鬼木神客死傷亡自刑枉死之祟犯重五通香火之神西南方作犯土府太歲為災驚動司命挑起是魘死鬼兵死囚禁傷亡家收古物下逆於上注失西方親人送物有女殃蠱毒鬼水怪河潭龍蜃之妖禍字在上南方自傷女鬼花木之精井竃不明家先有願在下兄弟祖父母鬼自生呪咀用心之過天神收攝必死不治點汙南北方呪咀神祇之願親人發動邪道為災及暗死女鬼犯重祖先親人傳尸鬼宿世𡨚家債主負命執占之鬼五通𢔒亡傷神挑起因將血物引東方𢔒鬼入宅為禍司命家先不安注失犯山神隂土不安惡星臨命五通古廟有願祟字在上有他人香火混雜房中內有自刑女鬼井泉之神在下有外人承事香火古墓伏尸傳勞之鬼先亡有願宅土不安點汙叔伯外祖神山鬼樹木精門前五道犯重客死女鬼籬下西四尺有暗昧之精刀劎之鬼死不治挑起西方花果遊戲之神宅土不安衆神有願百日內曾見怪物注失是作犯宅土傷死之鬼淨神有願觸犯大神邪字在上五方古墓神先亡為禍嶽神有願司命不安在下水陸有願三界淨神不安心口無憑乃天為患死不治點汙天神有願北方呪咀山魈及父母為災犯重兵死鬼南方路死傷亡惡死女鬼及東方遊戲五通鬼挑起門神五通樹木緋紫神城隍有願為禍注失獄死鬼女尸血亡山精猛烈之神五神不安妖字在上者傳尸病祖父鬼宅見惡怪星辰有願牀下伏尸女鬼在下河道傷亡出猖鬼北方毒疊女尸之鬼樂物之精點汙堂前伏尸父母親墓宅不利古物書畫之怪死不可治犯重因買患人衣物得病女殃暴敗死之鬼西南蠱毒精挑起石精銅鐵獸象之怪墓神山神河神客猖鬼古塜祟注失嶽神有願兄弟呪咀邪道鬼吏五猖山石之神怪字在上者三代家先客亡女鬼土地不安河道猖殤鬼血蠱神在下山魈火殃死鬼血死傷亡伏尸緋紫之神東北方飲食得患點汙幽暗鬼西方水精北方槐樹皂木之神死不治犯重兵死陳亡鬼五道相句宅土有願北方呪咀飛尸鬼挑起廚廁自刑女鬼東西方古廟神溝井不明之鬼注失二年內打死物命七世𡨚債星辰暗煞臨命也魍字勞字同在上者先世不孝父母之罪東南毒山精之鬼客死傷亡在下五方蠱毒氣樹木遊神山魈石精水魅河道惡死之鬼點汙十年作犯太嵗隂宅不安父母宗祖之鬼門神不安犯重血尸五通山魈為禍狐狸之精井竃不明挑起魘死鬼傳尸勞鬼南方飲食北方祖母古墓之神注失父母祖先祟山魈古塜之神新死之鬼北方古墓土鬼魎字在上山魈猴精之鬼同司命猖傷客亡自縊之鬼傳尸勞瘵在下舊宅下承事之神東西遊戲花果之鬼釘鐵之精點汙一年內買道僧衣物淨神有願星辰照命掃帚之精犯重橫死鬼伏尸祖先傳病鬼五道山神為禍挑起外祖父母入宅同先祖父母司命為災受患上清天樞院回車畢道正法卷下終
