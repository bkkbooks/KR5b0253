body:
  text: 上清九老仙都之印夫上清九老仙都印者佩之入山狼虎精怪自伏遇過江河風雨順濟可管天下洞府仙官若佩其印兵不能害虎不能傷水不能溺臨大危難必有善生常人佩之夀命延長伏諸邪鬼百惡不侵及治小兒夜啼驚風及大人諸般疾患並燒灰用乳香湯調下立効催生下死胎此印佩之安胎婦人無子佩之有孕及解呪咀𡨚枉令人聦明用之皆應印濶二寸二分方正厚八分印文分八字作二行疊篆治都緫攝之印夫治都緫攝之印者爲之兵印有此印者能管天下三界鬼神仙官分野城隍社廟吏兵皆得差使不論髙下此印佩之如上天帝命凶惡鬼神皆伏若行法職官不得此印者難用鬼兵印行兵將行印住兵將住動印如動兵若用此印兵將不行不論髙下並皆處斬自有鬼神直之云斬了便可具狀奏聞上帝故兵隨印轉將逐令行違命之罪皆須重焉印闊二寸二分方正厚八分印文分六字作二疊篆都天大雷火印夫都天大雷火印者治天下山川林木廟宇神壇龍蜃並皆起之印動雷動此印不可與他印相雜使用只是求甘雨於有龍處用鐵版一面用紙封上押字用此印印之令人送於水中龍神立起如水有怪林木爲妖古廟興災皆行文於内押字用此印印之其水內有怪自死廟宇自壞林木自枯或被天火雷電所燒印闊二寸二分方正厚八分印文分六字作二行疊天文篆提舉城隍司印夫提舉城隍司印者受提舉城隍之職代天行化凡受此職者須得此印無此印不行天下城隍神所行去處隂官自報皆有鬼神迎接佐送亦差助法兵吏所直經過山林廟宇或渡江河海次日夜常有本屬兵吏侍右凡牒城隍只用此印即時報應或城隍兵不至爲之不從便可具狀間奏上帝依法移居并位印闊二寸二分方正厚八分印文分六字作二行疊天文篆上清天樞院印夫上清天樞院印者爲上清三天門下進奏之司凡於人世爲民行法申奏天曹關牒中界下界鬼神之事皆須此印除天界上帝可具狀奏聞中界五嶽名山大川下至酆都之神不論髙下並用關牒及佩之除邪服之治病有此印隨行天下鬼神皆伏所行之處鬼神侍右印闊一寸八分長一寸九分印文分六字作二行疊篆都天大法主印夫都天大法主印者管天下邪精六洞魔王凡有精邪作孽龍蜃與祅與民爲患所行符籙皆須此印及人有𡨚枉呪咀宿世𡨚靈負命欠財一切疾苦佩此印𡨚靈不能近惡業不能侵及除夜夢和合萬事常服除宿疾令人延夀不患蠱毒不生九蟲及下死胎催生並皆焼灰吞服印闊一寸八分長一寸九分印文分六字作二行疊篆上清朱明神符散形聚形夫上清朱明神符者是北斗七元聖君之眞炁自然而成形也係上清天樞院使行可以破廟除邪入瘟辟疫常佩護身萬惡不侵鬼神見之如大火山常服令人聦明不生惡疾毐藥不害不懼刀刄及治諸般惡疾能止疼痛及治顚邪小兒夜啼驚風婦人安胎催生下死胎及鬼氣鬼胎去三尸剪鬼交皆換湯液服之無不應驗右篆此符用左手搯午上爲訣念呪書之呪曰北斗七眞天中大神上朝金闕下覆崑崙調理綱紀統制乾坤貪狼巨門禄存文曲廉貞武曲破軍輔星大周天界細入微塵何災不滅何福不臻元皇正炁來合我身天罡所指畫夜常輪隔居小人好道求眞常見尊儀願賜長生髙上玉皇紫微帝君三台生我來三台養我來三台護我來魁𩲃䰢魓魒又呪曰乾元亨利貞日月是吾兵神符入五臟永保得安寜急急如上清律令勑上清九獄神符夫上清九獄神符者治人間精邪爲害惡毐典祅開門閉户井泉湧沸屋宅鍋釡虛響蟲鼠作怪諸般變現形影使人顚狂令人久病困痾牀枕服藥無効宅舍之下腥羶之鬼穢觸之精無由斷絶即今具狀經本院投押用鐡版生砂依法書篆鎭所居之地埋之凡置鄷都獄用黄絹一尺二寸闊七寸書之黏於獄内如水怪作孽投於水中鐵版大者長二尺四寸闊一尺二寸小者長一尺二寸闊七寸書之凡書此符須六戊日可篆餘日不可篆及篆符時脚分丁字無令人見用左手大指搯中指中節爲訣誦呪書之呪曰九獄靈君酆都大神張馬四毐擒伏鬼神金羅鐵網収單邪精三天帝勑法令嚴行九州土地社伯行兵風火雷電有鬼粉形百千萬卒黑風火鈴獄名大火無劫更生鐵師銅狗傷食汝形一筆天地二筆滅精三筆風伯四筆獄成神符下鎭萬鬼摧傾急急如上清律令勑右誦呪七遍書成又呪曰酆都九獄神上帝勑奉行敢有不伏者罪在五嶽兵六丁六甲捉歩罡斗無情勑付魁罡下萬鬼不存形急急如上清律令勑右誦呪七遍噀水七口於符上了放訣上清雷公符夫上清雷公神符者治瘟邪疫炁山嵐瘴炁五般蠱炁傳屍勞瘵山精鬼魅猖狂客死伏屍古怪投河自縊兵亡藥死產亡林木遊神作犯宅土及他人承事之神被遣不去墳墓興災者並仰具狀經本院投押付所居之神後方可用鐵版上書此符五道於五方埋之其鬼神只見雷火焼宅皆無入處或是他人家自夢被火所焼瘟疫之家得此符患人皆見大火心如發狂時即涼汗立安若是古廟興祅林木成器爲民患者亦書此符一道埋於廟中林木之下其廟自壤其林自枯不然有天火燒之如水中有怪書此符一道投於水中其怪自滅其鬼自驅有龍自起鐵版須得水日打火日書鐵版長一尺四寸闊八寸入淨室內書時丁罡三歩左乎搯火日宫辰爲訣誦呪書之呪曰都天雷公呼雲震風青雷赤炁洞按九宫赤雷白炁上遊上穹白雷黑炁北遊元酆黑雷黃炁太極元衝黃雷青炁遍滿虚空周天火界炎炎赤風何神不伏何鬼不從逆我者死從我者封北雲黑歷九醜紫童風伯兩師驅電飲風神符至處邪鬼無蹤急急如上清律令勑右誦呪一十四遍書成鎭所居之地又呪曰都天大雷公霹靈變虚空刀兵三十萬炎散紫洞中如有不伏者嚴令輙不容攝付魁罡下未爲清淨風急急如上清律令勑右誦八十一遍噀水九口於符上了放訣上清火鈴神符夫上清火鈴神符者治婦人無子懷孕不安有孕不過三五月間自然落下或養子不成不過一二歳而死多方作福而無應驗能治如此之事非尋常也或因門户風水或是墳塚所招或是宅有伏屍或是井竈不利或因作犯或是星神或夫妻二命相刑或祖宗有過或前世不欽子孫或自髙曽辜負父母或室户不明大凡若要子息夀命堅牢切須戒忌朔望弦晦四時八節甲子庚申大風大雨大寒大暑大飽大饑大醉星月之下井竃神祗之前雷電震響天有祥雲日月交蝕切愼行房如能依此方子息受胎安穩相貌十全福夀延遠若不依此假使長子長夀必須醜惡貧薄及令短夀凡有此事並仰具狀經本院投押依式書此神符夫妻佩帯不過月日之問便有吉夢受胎必生貴子長下亦須令佩此符永無疾患具福長夀百鬼不侵萬邪不害若用鐵版或木板不拘大小書篆焚香供飬大辟瘟疫治火炎並用未書左手大指搯寅上爲訣誦呪書之若人佩帯供養天使靈官祐之呪曰大火鈴空監生上穹執籙掌籍好生韓公五帝破魂三台禄封七元助魄神元負宗屍鬼辟合不欲鬼窮但受人命殺邪却蹤上天勑賜永受仙宫虚無大神斷惡除凶九天司命令元祖公注命生根度人靈通絕却逆鬼斬除邪蹤神符覆護紫雲其容急急如上清律令勑右誦呪二十一遍書成又呪曰周天大火鈴保命受延齡三屍俱辟合靈寳守長生不欲人道窮但欲仙道成遏人三黄章五嶽碧靈空急急如上清律令勑右誦呪三十六遍噀水一口於符上了放訣上清丁甲神符夫上清丁甲神符者治人間作犯太歳土符神殺又他人家造作飛土臨宅及𦵏犯山神風水不順多生災咎婦人隂小生瘡頻被湯火傷害久病牀枕服藥不効或命屬凶星運限相併令人矇昩作事遅延夜多亂夢人口不安及雌雄殺䘮車句連及命屬他人呪咀常多疾病心神不寧家中常令人顚狂宅有伏屍怪物自傷刑害之鬼夜出現形打燈放火驚嚇婦女小兒財物虛耗並仰具狀經本院投押書此靈符或供養或佩帯可立應驗若有造作亦書此符二十四道於宅上周帀貼之不須歇宅自有吉神衞護凶星惡殺不敢爲害書此神符並用生砂用左手大指搯午上爲訣誦呪書之用無不驗也呪曰丁甲将軍天蓬尊神三台仰助六甲六丁前驅九醜後滅山精泉靈通濟上帝勑行九州土地山澤河源二十八宿六神平安童子行令八卦尊乾朱雀祐助玄武當千青龍正主白虎㐲連上通金闕下合乾元緫管鬼兵衮同上天符主魁罡萬祅摧遷急急如上清律令勑右誦呪二十一遍書成又呪曰丁甲大将軍六十上陽神太上髙上道勑賜魁罡君収擒山澤鬼下捉土黄神若有不正者乾元亨利貞急急如上清律令勑右誦呪八十一遍噀水一口於符上了放訣上清北斗七元符夫上清北斗七元聖君符者治人間宿造惡業祖宗之祟傳成瘵疾𨔛互相感無藥可治遂乾枯四肢形狀如命未終先傳宗裔如此之狀求無盡歇於是上帝哀愍降此靈符今各書篆焼灰用柳木剋人子七箇用無灰酒煎調下日服三道不經十日其蟲自死其形漸生有此狀者並仰具狀經本院投押録本人情狀聞奏上帝及牒嶽瀆謝過解釋然後可篆此符給付患人依式吞服及篆此符二十一道於屋下四周安貼并篆佩帯立有吉夢亦感上眞降眞炁獲身此符常帯保命護身不招横禍鎮宅大吉此符並用生砂書篆用左手大指搯子上爲訣誦呪書之呪曰北牛七星玉眞仙靈貪狼巨門保命長榮禄存文曲使臣聦明廉貞武曲衞臣安寜破軍輔星護臣身形常居吉慶永處福齡注上生籍勾落死名神清氣爽洞達幽㝠禦邪攝鬼群祅摧傾學道修真伏願遂成七元覆護飛昇紫庭五臟神君各保安寧急急如上清律令勑右誦呪一十四遍書成又呪曰大聖七元君天中至尊神願保未長生三尸辟合群擎羊大神將絶却死命門陀羅爲散花常得延夀年急急如上清律今勑右誦七遍噀水一口於符上了放訣上清三台神符夫上清三台符者大寧吉慶之宿歴藎萬事凡人命值星宿運限不通惡曜纏照頻招官事宅發瘟黄長子多生疾患及婦人難産有三世𡨚家債主負命欠財無由解脫並仰具狀經本院投押用黄綾書此眞符戴於頭上即時凶星不照𡨚鬼不侵此符爲天中㔶蓋至眞之寳用左手大指搯辰上爲訣誦呪書之呪曰三台星君護我身形用天覆護紫炁順成六元辟合斬攝威靈太乙伏我河圖六經髙上神王飛天自扄無惒元始照冑元精猛馬四張幢鼔金鈴巨天甲卒六甲六丁遊行天下㔶蓋身形何災敢現何鬼怒晴災視者滅怒晴者傾神符一單天不視形急急如上清律令勑右誦呪一十四遍書成又呪曰三台生我來本命得長生三台養我來上帝保護持三台護我來永夀得安寧勑付魁罡下元亨大利貞急急如上清律令勑右誦呪四十九遍噀水一口於符上了放訣上清黒殺神符夫上清黒殺神符者治水怪江河龍蜃作孽興風作浪䧟没舟航曲求祭祀損害人命之事並仰具狀經本院投押用鐡版一片長一尺二寸闊七寸朱書此符下鎮興祅之地其龍蜃即時移居苦黒殺眞君聞龍蜃觸符即親下伏之若渡江海用紙書佩之不受水厄大辟水怪亦能鎮宅除災驅怪用左手大指搯亥上訣誦呪書之並用生砂呪曰黑殺莫君光化日月威鎭乾坤行符攝籙斷絶鬼門遊行天下収捉鬼神行神布炁掃除五瘟左右吏兵三五将軍雷公霹靂電掣雲奔刀劔如雨隊仗如雲吐牙努力破碎其形九州社令血食之兵神符降令法到奉行果不從命殺不容情蘷龍赫奕紅霞紫庭急急如上清律令勑右誦呪十八遍書成又呪曰黑殺大力神無邊濟法界擒魔東邪精遍遊周天界驅龍入江海達逹苦幽濟金劎斬祅兇鬼邪當自弭急急如上清律令勑右誦呪二十一遍噀水一口於符上了放訣上清五嶽眞形符夫上清五嶽眞形符者入山能伏狼虎入水能伏龍蜃佩之吉祥不遭患難及蟲蟻損害屋宇飛鳥入屋作怪蟲蛇岀現並仰具狀經本院投押用梓木板長二尺四寸阔一尺二寸朱曹此符釘於宅上其怪自壞蟲蟻自去永不爲害也若佩之保身護命辟諸危難修行之士切須佩之免有魔障此符用左手大指搯己上爲訣誦呪書之呪曰五嶽眞形受天禹經大洞魔三九醜元靈戰魔捉鬼降伏祅精天丁力士吐馬雲增速送𡨚靈甲乙戊巳壬癸庚辛丙丁攝炎六羅大千元罡九網合元歸神總廣上曜太虛太清上帝蓋護土地安寜太微六甲混合乾元八九神符下鎭山川勑至奉行急急如上清律令勑右誦呪一十四遍書成又呪曰五嶽大靈符収擒滅惡趣若有犯我者天車衮地車風雷行火電猛將㐲魔誅勑付魁罡下騎鬼奉天驅急急如上清律令勑右誦呪一十八遍噀水一口於符上了放訣上清天罡神符夫上清天罡神符者治人間精邪惡毒蠱氣鬼胎鬼炁傳行人道損害人命及諸爲祅一切邪神在人宅舍非理執占不去及牛瘟六畜瘟災並仰具狀經本院投押皆用朱書此符安鎮立獲吉祥及書佩帯延夀辟惡除三尸去九蟲不受瘟禍剪鬼交井治小兒夜啼驚呌顚邪山嵐瘴氣五般痁疾諸般疾苦皆能辟伏用左手大指搯子上爲訣誦呪書之呪曰天罡大神九九七眞元命太乙殺鬼氛氳九州分野太白尊星周行六合炎災火鈴八威吐毒伏鬼不刑三十五萬食鬼吞精幽㝠大赫降魔㐲靈大千世界緫氣上兵何神不祐何鬼敢停泰山丈人揚揚虛霐訐惡之鬼盡使刀兵神符永鎮萬鬼不寜急急如上清律令勑右誦呪八遍書成又呪曰三十六天罡天中大神王炎帝烈我血賜我爲上黄七緫太元君爲吾驅禍殃眞炁受雷火老公㐲火光急急如上清律令勑右誦呪二十一遍噀水一口於符上了放訣上清天樞院回車畢道正法卷上
